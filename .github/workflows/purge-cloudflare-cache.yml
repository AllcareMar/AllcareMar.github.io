name: Purge Cloudflare Cache

# Se dispara automáticamente cada vez que GitHub Pages termina de
# construir/desplegar el sitio (después de cualquier push a main que
# toque los archivos publicados). Así el caché de Cloudflare se limpia
# solo, sin que nadie tenga que borrar cookies/caché a mano.
on:
  page_build

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare cache (allcaremar.com)
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            --fail
