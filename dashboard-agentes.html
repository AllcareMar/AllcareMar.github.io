<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agent Dashboard — Allcare Mar Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root{
  --blue:#1a2fd4; --blue-dark:#0f1e9a; --blue-light:#e8ecff;
  --red:#e8001d; --red-dark:#b50016; --red-light:#fff0f2;
  --white:#ffffff; --gray-50:#faf8f5; --gray-100:#f3efe9; --gray-200:#e6e0d6;
  --gray-400:#8b8377; --gray-600:#544f47; --gray-800:#2b2723;
  --green:#00a86b; --warm-card:#fffdfa;
  --r:12px; --r-lg:20px; --r-xl:28px;
  --sh:0 4px 24px rgba(58,53,48,.08); --sh-lg:0 16px 56px rgba(58,53,48,.14);
  --t:.25s ease;
  --sidebar-w:270px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;overflow-x:hidden}
body{font-family:'Open Sans',sans-serif;color:var(--gray-800);background:var(--gray-50);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Montserrat',sans-serif;line-height:1.2}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

/* ---------- Sidebar ---------- */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--blue-dark),var(--blue));
  color:#fff;display:flex;flex-direction:column;z-index:100;
  box-shadow:var(--sh-lg);
}
.sidebar-brand{padding:26px 24px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:12px}
.sidebar-brand img{height:34px;width:auto;filter:brightness(0) invert(1)}
.sidebar-brand .name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;letter-spacing:.02em}
.sidebar-user{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.15)}
.sidebar-user .hi{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.75;font-family:'Montserrat',sans-serif;font-weight:700;margin-bottom:6px}
.sidebar-user .agent-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15.5px;line-height:1.3;word-break:break-word}
.sidebar-user .agent-email{font-size:12px;opacity:.75;margin-top:4px;word-break:break-word}
.sidebar-nav{flex:1;padding:18px 14px;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13.5px;color:#fff;opacity:.85;transition:var(--t);margin-bottom:4px}
.sidebar-nav a i{width:18px;text-align:center;font-size:14px}
.sidebar-nav a:hover{background:rgba(255,255,255,.14);opacity:1}
.sidebar-foot{padding:18px 14px;border-top:1px solid rgba(255,255,255,.15)}
.lang-toggle{width:100%;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:9px 16px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;cursor:pointer;letter-spacing:.03em;margin-bottom:10px}
.lang-toggle:hover{background:rgba(255,255,255,.26)}
.btn-logout{width:100%;background:var(--red);border:none;color:#fff;padding:12px 16px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--t)}
.btn-logout:hover{background:var(--red-dark)}

/* ---------- Main content ---------- */
.main-content{margin-left:var(--sidebar-w);min-height:100vh;padding:40px 4vw 60px}
.dash-title{font-size:24px;font-weight:800;color:var(--blue-dark);margin-bottom:6px}
.dash-sub{font-size:13.5px;color:var(--gray-600);margin-bottom:36px}

.section-block{margin-bottom:48px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-head .si{width:40px;height:40px;border-radius:12px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.section-head.red .si{background:var(--red-light);color:var(--red)}
.section-head h2{font-size:18px;font-weight:800;color:var(--gray-800)}
.section-head p{font-size:12.5px;color:var(--gray-600);margin-top:2px}

.tool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.tool-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--r-lg);padding:32px 22px;text-align:center;transition:var(--t);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:130px}
.tool-card:hover{border-color:var(--blue);transform:translateY(-4px);box-shadow:var(--sh-lg)}
.tool-card .ti-img{width:64px;height:64px;object-fit:contain}
.tool-card .tn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13.5px;color:var(--gray-800)}

.carrier-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.carrier-card{background:var(--warm-card);border:1.5px solid var(--gray-200);border-radius:var(--r-lg);padding:34px 18px;text-align:center;transition:var(--t);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:120px}
.carrier-card:hover{border-color:var(--red);transform:translateY(-4px);box-shadow:var(--sh-lg)}
.carrier-card .clogo{max-width:100%;width:auto;height:auto;max-height:68px;object-fit:contain}
.carrier-card .cx{font-size:10.5px;color:var(--gray-400);font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:4px}

footer.auth-mini-footer{padding:22px 20px;text-align:center;font-size:11.5px;color:var(--gray-400);background:#fff;border-top:1px solid var(--gray-200);margin-left:var(--sidebar-w)}
footer.auth-mini-footer a{color:var(--gray-600);font-weight:700;margin-left:6px}

@media(max-width:1100px){.carrier-grid{grid-template-columns:repeat(3,1fr)}.tool-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){
  :root{--sidebar-w:0px}
  .sidebar{position:relative;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:14px 5vw}
  .sidebar-brand,.sidebar-user{border-bottom:none;padding:8px 10px}
  .sidebar-nav{display:none}
  .sidebar-foot{border-top:none;display:flex;gap:10px;padding:8px 10px;flex:1;min-width:220px}
  .lang-toggle{margin-bottom:0;width:auto;flex:0 0 auto;padding:9px 14px}
  .btn-logout{width:auto;flex:0 0 auto}
  .main-content{margin-left:0;padding:32px 5vw 50px}
  footer.auth-mini-footer{margin-left:0}
  .tool-grid{grid-template-columns:repeat(2,1fr)}
  .carrier-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .tool-grid{grid-template-columns:1fr}
  .carrier-grid{grid-template-columns:1fr}
  .sidebar{flex-direction:column;align-items:stretch}
  .sidebar-foot{flex-direction:column}
}
</style>
</head>

<script type="module">
import { WORKSPACE_DOMAIN } from "./google-config.js";

let curLang='en';
const I18N = {
  en:{ welcome:'Signed in as', logout:'Logout',
    dashTitle:'Agent Tools', dashSub:'Access your corporate resources and Medicare carrier portals below.',
    nav1:'Agency & Logistics', nav2:'Medicare Portals',
    sec1Title:'Agency & Logistics',
    sec2Title:'Medicare Portals',
    linkTag:'Open link',
    t1:'Daily Sales Report', t2:'Conference Room - 546 Office', t3:'IT - Ticket', t4:'Sprinter / Van Reservations',
    t5:'Agents Contact List', t6:'Training Videos', t7:'Support Materials',
    t8:'Berwick Insurance', t9:'Integrity Connect', t10:'Integrity Connect Leads', t11:'T65.app' },
  es:{ welcome:'Sesión iniciada como', logout:'Cerrar Sesión',
    dashTitle:'Herramientas del Agente', dashSub:'Accede a tus recursos corporativos y a los portales de las aseguradoras de Medicare.',
    nav1:'Agencia y Logística', nav2:'Portales de Medicare',
    sec1Title:'Agencia y Logística',
    sec2Title:'Portales de Medicare',
    linkTag:'Abrir enlace',
    t1:'Reporte Diario de Ventas', t2:'Sala de Conferencias - Oficina 546', t3:'Ticket de TI', t4:'Reservas de Sprinter/Van',
    t5:'Directorio de Agentes', t6:'Videos de Capacitación', t7:'Materiales de Apoyo',
    t8:'Berwick Insurance', t9:'Integrity Connect', t10:'Integrity Connect Leads', t11:'T65.app' }
};
function applyLang(){
  const t = I18N[curLang];
  document.documentElement.lang = curLang; document.documentElement.setAttribute('data-lang',curLang);
  document.getElementById('lang-label').textContent = curLang==='en' ? 'ES' : 'EN';
  document.getElementById('welcome-label').textContent=t.welcome;
  document.getElementById('logout-label').textContent=t.logout;
  document.getElementById('dashTitle').textContent=t.dashTitle;
  document.getElementById('dashSub').textContent=t.dashSub;
  document.getElementById('nav1').textContent=t.nav1;
  document.getElementById('nav2').textContent=t.nav2;
  document.getElementById('sec1Title').textContent=t.sec1Title;
  document.getElementById('sec2Title').textContent=t.sec2Title;
  document.getElementById('tool1').textContent=t.t1;
  document.getElementById('tool2').textContent=t.t2;
  document.getElementById('tool3').textContent=t.t3;
  document.getElementById('tool4').textContent=t.t4;
  document.getElementById('tool5').textContent=t.t5;
  document.getElementById('tool6').textContent=t.t6;
  document.getElementById('tool7').textContent=t.t7;
  document.getElementById('tool8').textContent=t.t8;
  document.getElementById('tool9').textContent=t.t9;
  document.getElementById('tool10').textContent=t.t10;
  document.getElementById('tool11').textContent=t.t11;
  document.querySelectorAll('.carrier-card .cx').forEach(el=>el.textContent=t.linkTag);
  applyMiniFooter();
}
function toggleLang(){ curLang = curLang==='en'?'es':'en'; applyLang(); }
document.getElementById('langBtn').addEventListener('click', toggleLang);

function applyMiniFooter(){
  document.getElementById('mini-copy').textContent = curLang==='en' ? '© 2026 Allcare Mar Insurance Agents. All Rights Reserved.' : '© 2026 Allcare Mar Insurance Agents. Todos los derechos reservados.';
  document.getElementById('mini-priv').textContent = curLang==='en' ? 'Privacy & Security Policy (PDF)' : 'Politica de Privacidad y Seguridad (PDF)';
}

document.getElementById('logoutBtn').addEventListener('click', function(){
  sessionStorage.removeItem('acm_gsession');
  if(typeof google !== 'undefined' && google.accounts){ try{ google.accounts.id.disableAutoSelect(); }catch(e){} }
  window.location.href='index.html';
});

(function guard(){
  const raw = sessionStorage.getItem('acm_gsession');
  if(!raw){ window.location.href='login.html'; return; }
  let session;
  try{ session = JSON.parse(raw); }catch(e){ sessionStorage.removeItem('acm_gsession'); window.location.href='login.html'; return; }

  const domain = (session.email||'').split('@')[1] || '';
  const nowSec = Math.floor(Date.now()/1000);
  if(domain.toLowerCase() !== WORKSPACE_DOMAIN.toLowerCase() || !session.exp || nowSec > session.exp){
    sessionStorage.removeItem('acm_gsession');
    window.location.href='login.html';
    return;
  }
  document.getElementById('agentName').textContent = session.name || session.email;
  document.getElementById('agentMeta').textContent = session.email;
})();
applyLang();
</script>
