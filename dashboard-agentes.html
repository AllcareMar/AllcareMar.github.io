<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agent Dashboard — Allcare Mar Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root{
  --blue:#1a2fd4; --blue-dark:#0f1e9a; --blue-light:#e8ecff;
  --red:#e8001d; --red-dark:#b50016; --red-light:#fff0f2;
  --white:#ffffff; --gray-50:#faf8f5; --gray-100:#f3efe9; --gray-200:#e6e0d6;
  --gray-400:#8b8377; --gray-600:#544f47; --gray-800:#2b2723;
  --green:#00a86b; --warm-card:#fffdfa;
  --r:12px; --r-lg:20px; --r-xl:28px;
  --sh:0 4px 24px rgba(58,53,48,.08); --sh-lg:0 16px 56px rgba(58,53,48,.14);
  --t:.25s ease;
  --sidebar-w:270px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;overflow-x:hidden}
body{font-family:'Open Sans',sans-serif;color:var(--gray-800);background:var(--gray-50);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Montserrat',sans-serif;line-height:1.2}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

/* ---------- Sidebar ---------- */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--blue-dark),var(--blue));
  color:#fff;display:flex;flex-direction:column;z-index:100;
  box-shadow:var(--sh-lg);
}
.sidebar-brand{padding:30px 24px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
.sidebar-brand img{height:auto;width:100%;max-width:200px;filter:brightness(0) invert(1)}
.sidebar-user{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.15)}
.sidebar-user .hi{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.75;font-family:'Montserrat',sans-serif;font-weight:700;margin-bottom:6px}
.sidebar-user .agent-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15.5px;line-height:1.3;word-break:break-word}
.sidebar-user .agent-email{font-size:12px;opacity:.75;margin-top:4px;word-break:break-word}
.sidebar-nav{flex:1;padding:18px 14px;overflow-y:auto}
.nav-group{margin-bottom:4px}
.nav-group-toggle{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13.5px;color:#fff;opacity:.9;background:transparent;border:none;cursor:pointer;transition:var(--t)}
.nav-group-toggle i:first-child{width:18px;text-align:center;font-size:14px}
.nav-group-toggle .chev{margin-left:auto;font-size:11px;transition:transform .2s ease}
.nav-group-toggle:hover{background:rgba(255,255,255,.14);opacity:1}
.nav-group.open .nav-group-toggle{background:rgba(255,255,255,.1);opacity:1}
.nav-group.open .nav-group-toggle .chev{transform:rotate(180deg)}
.nav-sublist{display:none;flex-direction:column;padding:2px 6px 10px 40px}
.nav-group.open .nav-sublist{display:flex}
.nav-sub-link{display:block;padding:7px 8px;font-size:12px;color:#fff;opacity:.72;border-radius:6px;transition:var(--t);line-height:1.3}
.nav-sub-link:hover{opacity:1;background:rgba(255,255,255,.12)}
.nav-sub-link.disabled{opacity:.35;cursor:default}
.sidebar-foot{padding:18px 14px;border-top:1px solid rgba(255,255,255,.15)}
.lang-toggle{width:100%;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:9px 16px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;cursor:pointer;letter-spacing:.03em;margin-bottom:10px}
.lang-toggle:hover{background:rgba(255,255,255,.26)}
.btn-logout{width:100%;background:var(--red);border:none;color:#fff;padding:12px 16px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--t)}
.btn-logout:hover{background:var(--red-dark)}

/* ---------- Main content ---------- */
.main-content{margin-left:var(--sidebar-w);min-height:100vh;padding:40px 4vw 60px}
.dash-title{font-size:24px;font-weight:800;color:var(--blue-dark);margin-bottom:6px}
.dash-sub{font-size:13.5px;color:var(--gray-600);margin-bottom:36px}

.section-block{margin-bottom:48px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-head .si{width:40px;height:40px;border-radius:12px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.section-head.red .si{background:var(--red-light);color:var(--red)}
.section-head h2{font-size:18px;font-weight:800;color:var(--gray-800)}
.section-head p{font-size:12.5px;color:var(--gray-600);margin-top:2px}

.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px}
.tool-card{aspect-ratio:1/1;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--r);padding:10px 8px;text-align:center;transition:var(--t);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.tool-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--sh-lg)}
.tool-card.disabled{cursor:default;opacity:.55}
.tool-card.disabled:hover{transform:none;box-shadow:none;border-color:var(--gray-200)}
.tool-card .ti-img{width:52px;height:52px;object-fit:contain}
.tool-card .ti-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px}
.tool-card .tn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:10.5px;color:var(--gray-800);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.carrier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px}
.carrier-card{aspect-ratio:1/1;background:var(--warm-card);border:1.5px solid var(--gray-200);border-radius:var(--r);padding:14px 10px;text-align:center;transition:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:center}
.carrier-card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:var(--sh-lg)}
.carrier-card .clogo{max-width:100%;width:auto;height:auto;max-height:56px;object-fit:contain}

footer.auth-mini-footer{padding:22px 20px;text-align:center;font-size:11.5px;color:var(--gray-400);background:#fff;border-top:1px solid var(--gray-200);margin-left:var(--sidebar-w)}
footer.auth-mini-footer a{color:var(--gray-600);font-weight:700;margin-left:6px}

@media(max-width:900px){
  :root{--sidebar-w:0px}
  .sidebar{position:relative;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:14px 5vw}
  .sidebar-brand,.sidebar-user{border-bottom:none;padding:8px 10px}
  .sidebar-nav{display:none}
  .sidebar-foot{border-top:none;display:flex;gap:10px;padding:8px 10px;flex:1;min-width:220px}
  .lang-toggle{margin-bottom:0;width:auto;flex:0 0 auto;padding:9px 14px}
  .btn-logout{width:auto;flex:0 0 auto}
  .main-content{margin-left:0;padding:32px 5vw 50px}
  footer.auth-mini-footer{margin-left:0}
}
@media(max-width:480px){
  .tool-grid,.carrier-grid{grid-template-columns:repeat(auto-fill,minmax(92px,1fr))}
  .sidebar{flex-direction:column;align-items:stretch}
  .sidebar-foot{flex-direction:column}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <img src="assets/img/logo-allcaremar.png" alt="Allcare Mar Agency"/>
  </div>
  <div class="sidebar-user">
    <div class="hi" id="welcome-label"></div>
    <div class="agent-name" id="agentName"></div>
    <div class="agent-email" id="agentMeta"></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group" id="navGroupTools">
      <button class="nav-group-toggle" type="button"><i class="fas fa-briefcase"></i> <span id="nav1"></span> <i class="fas fa-chevron-down chev"></i></button>
      <div class="nav-sublist" id="navToolsList"></div>
    </div>
    <div class="nav-group" id="navGroupCarriers">
      <button class="nav-group-toggle" type="button"><i class="fas fa-notes-medical"></i> <span id="nav2"></span> <i class="fas fa-chevron-down chev"></i></button>
      <div class="nav-sublist" id="navCarriersList"></div>
    </div>
  </nav>
  <div class="sidebar-foot">
    <button class="lang-toggle" id="langBtn"><span id="lang-label">ES</span></button>
    <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span id="logout-label"></span></button>
  </div>
</aside>

<main class="main-content">
  <div class="dash-title" id="dashTitle"></div>
  <div class="dash-sub" id="dashSub"></div>

  <div class="section-block" id="agencia-logistica">
    <div class="section-head">
      <div class="si"><i class="fas fa-briefcase"></i></div>
      <div>
        <h2 id="sec1Title"></h2>
      </div>
    </div>
    <div class="tool-grid" id="toolGrid"></div>
  </div>

  <div class="section-block" id="medicare-portals">
    <div class="section-head red">
      <div class="si"><i class="fas fa-notes-medical"></i></div>
      <div>
        <h2 id="sec2Title"></h2>
      </div>
    </div>
    <div class="carrier-grid" id="carrierGrid"></div>
  </div>
</main>

<footer class="auth-mini-footer">
  <span id="mini-copy"></span><a href="privacy-security-policy.pdf" target="_blank" rel="noopener" id="mini-priv"></a>
</footer>

<script type="module">
import { WORKSPACE_DOMAIN } from "./google-config.js";

let curLang='en';

// Fuente única de los accesos de Agency & Logistics — se usa para pintar tanto
// las tarjetas del panel principal como los links del menú lateral. Para
// agregar un acceso nuevo en el futuro, solo hay que agregar un objeto aquí
// (respetando el orden = orden en que aparece en ambos lugares).
const TOOLS = [
  { img:'assets/img/dashboard/daily-sales-report.webp', href:'https://server-bayonne.tailed39b8.ts.net:10000', en:'Daily Sales Report', es:'Reporte Diario de Ventas' },
  { img:'assets/img/dashboard/it-ticket.webp', href:'https://form.jotform.com/250776977609173', en:'IT Ticket', es:'Ticket de TI' },
  { icon:'fa-calendar-check', comingSoon:true, en:'Appointment Request', es:'Solicitud de Cita' },
  { img:'assets/img/dashboard/agents-contact-list.webp', href:'https://drive.google.com/file/d/1WABdj0wHak0uXmtOo0DrNL4xvYpzwoAj/view?usp=drive_link', en:'Agents Contact List', es:'Directorio de Agentes' },
  { img:'assets/img/dashboard/training-videos.webp', href:'https://sites.google.com/allcaremar.com/allcaremaragency/agents-portal/training-videos', en:'Training Videos', es:'Videos de Capacitación' },
  { img:'assets/img/dashboard/support-materials.webp', href:'https://sites.google.com/allcaremar.com/allcaremaragency/agents-portal/support-library', en:'Support Materials', es:'Materiales de Apoyo' },
  { img:'assets/img/dashboard/berwick-insurance.webp', href:'https://berwickinsurance.com/login/', en:'Berwick Insurance', es:'Berwick Insurance' },
  { img:'assets/img/dashboard/integrity-connect.webp', href:'https://integrity.com/integrityconnect/', en:'Integrity Connect', es:'Integrity Connect' },
  { img:'assets/img/dashboard/integrity-connect-leads.webp', href:'https://integrity.com/leads/', en:'Integrity Connect Leads', es:'Integrity Connect Leads' },
  { img:'assets/img/dashboard/t65-app.webp', href:'https://t65.app/login.php?req=&No%20Cookie', en:'T65.app', es:'T65.app' },
  { img:'assets/img/dashboard/conference-room.webp', href:'https://calendar.app.google/eYGK81gqAonoFSkY6', en:'Conference Room - 546 Office', es:'Sala de Conferencias - Oficina 546' },
  { img:'assets/img/dashboard/sprinter-van.webp', href:'https://calendar.app.google/tsgeZzUyYEaUzfTdA', en:'Sprinter / Van Reservations', es:'Reservas de Sprinter/Van' }
];

// Misma idea para los portales de Medicare — agregar un carrier nuevo es un
// objeto más en este array (aparece automáticamente en la grilla y el menú).
const CARRIERS = [
  { img:'uhc-jarvis.webp', href:'https://www.uhcjarvis.com/', en:'UnitedHealthcare Jarvis', es:'UnitedHealthcare Jarvis' },
  { img:'mira.webp', href:'https://uhcmira.my.site.com/PartnerLoginPage?ec=302&startURL=%2Fs%2F', en:'Mira', es:'Mira' },
  { img:'aetna.webp', href:'https://www.aetna.com/producer_public/login.fcc', en:'Aetna', es:'Aetna' },
  { img:'humana.webp', href:'https://www.humana.com/agent/humana-agent-portal', en:'Humana', es:'Humana' },
  { img:'devoted-health.webp', href:'https://agent.devoted.com/', en:'Devoted Health', es:'Devoted Health' },
  { img:'jefferson-health.webp', href:'https://jeffersonhealthplans.com/medicare/broker-resources.html', en:'Jefferson Health Plans', es:'Jefferson Health Plans' },
  { img:'horizon.webp', href:'https://www.horizonblue.com/brokers/', en:'Horizon BCBSNJ', es:'Horizon BCBSNJ' },
  { img:'anthem.webp', href:'https://www.anthem.com/producer', en:'Anthem', es:'Anthem' },
  { img:'healthspring.webp', href:'https://healthspringforbrokers.zilverton.com/public/login', en:'HealthSpring', es:'HealthSpring' },
  { img:'emblemhealth.webp', href:'https://broker.emblemhealth.com/Broker/s/login/', en:'EmblemHealth', es:'EmblemHealth' },
  { img:'fidelis.webp', href:'https://www.fideliscare.org/brokers', en:'Fidelis Care', es:'Fidelis Care' },
  { img:'healthfirst.webp', href:'https://healthfirst.org/brokers', en:'Healthfirst', es:'Healthfirst' },
  { img:'molina-healthcare.webp', href:'https://molinaagentcenter.com/', en:'Molina Healthcare', es:'Molina Healthcare' },
  { img:'scanhealth.webp', href:'https://www.scanproducerportal.com/', en:'SCAN Health Plan', es:'SCAN Health Plan' },
  { img:'wellcare.webp', href:'https://www.wellcare.com/en/broker-resources/broker-resources', en:'Wellcare', es:'Wellcare' },
  { img:'wellpoint.webp', href:'https://www.wellpoint.com/broker', en:'Wellpoint', es:'Wellpoint' }
];

const I18N = {
  en:{ welcome:'Signed in as', logout:'Logout',
    dashTitle:'Agent Tools', dashSub:'Access your corporate resources and Medicare carrier portals below.',
    nav1:'Agency & Logistics', nav2:'Medicare Portals',
    sec1Title:'Agency & Logistics', sec2Title:'Medicare Portals',
    comingSoon:'Coming soon' },
  es:{ welcome:'Sesión iniciada como', logout:'Cerrar Sesión',
    dashTitle:'Herramientas del Agente', dashSub:'Accede a tus recursos corporativos y a los portales de las aseguradoras de Medicare.',
    nav1:'Agencia y Logística', nav2:'Portales de Medicare',
    sec1Title:'Agencia y Logística', sec2Title:'Portales de Medicare',
    comingSoon:'Próximamente' }
};

function label(x){ return curLang==='es' ? x.es : x.en; }

function renderTools(){
  const t = I18N[curLang];
  document.getElementById('toolGrid').innerHTML = TOOLS.map(x=>{
    const body = (x.icon
      ? '<div class="ti-icon"><i class="fas '+x.icon+'"></i></div>'
      : '<img class="ti-img" src="'+x.img+'" alt="'+label(x)+'" loading="lazy"/>')
      + '<div class="tn">'+label(x)+'</div>';
    return x.comingSoon
      ? '<span class="tool-card disabled" title="'+t.comingSoon+'">'+body+'</span>'
      : '<a class="tool-card" href="'+x.href+'" target="_blank" rel="noopener">'+body+'</a>';
  }).join('');
  document.getElementById('navToolsList').innerHTML = TOOLS.map(x=>
    x.comingSoon
      ? '<span class="nav-sub-link disabled" title="'+t.comingSoon+'">'+label(x)+'</span>'
      : '<a class="nav-sub-link" href="'+x.href+'" target="_blank" rel="noopener">'+label(x)+'</a>'
  ).join('');
}

function renderCarriers(){
  document.getElementById('carrierGrid').innerHTML = CARRIERS.map(c=>
    '<a class="carrier-card" href="'+c.href+'" target="_blank" rel="noopener"><img class="clogo" src="assets/img/carriers/'+c.img+'" alt="'+label(c)+'" loading="lazy"/></a>'
  ).join('');
  document.getElementById('navCarriersList').innerHTML = CARRIERS.map(c=>
    '<a class="nav-sub-link" href="'+c.href+'" target="_blank" rel="noopener">'+label(c)+'</a>'
  ).join('');
}

function applyLang(){
  const t = I18N[curLang];
  document.documentElement.lang = curLang; document.documentElement.setAttribute('data-lang',curLang);
  document.getElementById('lang-label').textContent = curLang==='en' ? 'ES' : 'EN';
  document.getElementById('welcome-label').textContent=t.welcome;
  document.getElementById('logout-label').textContent=t.logout;
  document.getElementById('dashTitle').textContent=t.dashTitle;
  document.getElementById('dashSub').textContent=t.dashSub;
  document.getElementById('nav1').textContent=t.nav1;
  document.getElementById('nav2').textContent=t.nav2;
  document.getElementById('sec1Title').textContent=t.sec1Title;
  document.getElementById('sec2Title').textContent=t.sec2Title;
  renderTools();
  renderCarriers();
  applyMiniFooter();
}
function toggleLang(){ curLang = curLang==='en'?'es':'en'; applyLang(); }
document.getElementById('langBtn').addEventListener('click', toggleLang);

document.querySelectorAll('.nav-group-toggle').forEach(btn=>{
  btn.addEventListener('click', ()=> btn.parentElement.classList.toggle('open'));
});

function applyMiniFooter(){
  document.getElementById('mini-copy').textContent = curLang==='en' ? '© 2026 Allcare Mar Insurance Agents. All Rights Reserved.' : '© 2026 Allcare Mar Insurance Agents. Todos los derechos reservados.';
  document.getElementById('mini-priv').textContent = curLang==='en' ? 'Privacy & Security Policy (PDF)' : 'Politica de Privacidad y Seguridad (PDF)';
}

document.getElementById('logoutBtn').addEventListener('click', function(){
  localStorage.removeItem('acm_gsession');
  if(typeof google !== 'undefined' && google.accounts){ try{ google.accounts.id.disableAutoSelect(); }catch(e){} }
  window.location.href='index.html';
});

(function guard(){
  const raw = localStorage.getItem('acm_gsession');
  if(!raw){ window.location.href='login.html'; return; }
  let session;
  try{ session = JSON.parse(raw); }catch(e){ localStorage.removeItem('acm_gsession'); window.location.href='login.html'; return; }

  const domain = (session.email||'').split('@')[1] || '';
  if(domain.toLowerCase() !== WORKSPACE_DOMAIN.toLowerCase() || !session.localExp || Date.now() > session.localExp){
    localStorage.removeItem('acm_gsession');
    window.location.href='login.html';
    return;
  }
  document.getElementById('agentName').textContent = session.name || session.email;
  document.getElementById('agentMeta').textContent = session.email;
})();
applyLang();
</script>
</body>
</html>
